<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Battle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css" />
</head>

<body class="min-vh-100 d-flex align-items-center justify-content-center">

    <div class="container" style="max-width: 700px;">

        <nav class="navbar mb-5" style="background-color: transparent;">
            <div class="container-fluid d-flex align-items-center justify-content-center">
                <img src="./assets/img/logo.png" alt="" width="250">
            </div>
        </nav>

        <div class="row align-items-center justify-content-center g-4 mb-4">

            <div class="col-5">
                <div class="bg-white card-pokemon card-pokemon-blue" data-card-ref="card-1">
                    <span class="text-muted text-center">Clique para escolher...</span>
                </div>
                <div class="rounded-4 text-center text-capitalize" data-card-name="card-1"
                    style="background-color: #3b68a9; color: #fff; font-size: 20px; font-weight: bold;">

                </div>
            </div>

            <div class="col-2 text-center">
                <span class="fs-3 fw-semibold text-dark">
                    <img src="./assets/img/vs.png" alt="" width="70">
                </span>
            </div>

            <div class="col-5">
                <div class="bg-white card-pokemon card-pokemon-red" data-card-ref="card-2">
                    <span class="text-muted text-center">Clique para escolher...</span>
                </div>
                <div class="rounded-4 text-center text-capitalize" data-card-name="card-2"
                    style="background-color: #d14246; color: #fff; font-size: 20px; font-weight: bold;">

                </div>
            </div>

        </div>

        <div class="row justify-content-center">
            <div class="col-12">
                <button id="btnLutar" class="btn w-100 py-3 fs-4 fw-bold shadow-sm"
                    style="border-radius: 20px; background-color: #fcca03 !important; color: #181818;">
                    &#9889; Batalhar &#9889;
                </button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPesquisa" tabindex="-1" aria-labelledby="modalPesquisaLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border border-dark border-2 rounded-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="modalPesquisaLabel">Pesquisar...</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <div class="list-group" id="list-group-prokemons">

                    </div>

                    <div class="col-12 justfy-content-center mt-5">
                        <button type="button" class="btn btn-dark rounded-3 px-4"
                            style="--bs-btn-padding-y: .25rem; --bs-btn-padding-x: .5rem; --bs-btn-font-size: .75rem;"
                            id="btnMaisResultados">Mais resultados</button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalResultado" tabindex="-1" aria-labelledby="modalResultadoLabel">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="modalResultadoLabel">Resultado da Batalha</h5>
                    <!-- <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button> -->
                </div>
                <div class="modal-body text-center py-4">
                    <p class="fs-5" id="mensagem-resultado"></p>
                    <div class="col-12" id="img-pokemon"></div>
                </div>
                <div class="modal-footer border-0 justify-content-center">
                    <button type="button" class="btn btn-dark rounded-3 px-4" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
</body>

</html>
